name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install deps
        run: npm install

      - name: Build
        env:
          CI: true
        run: npm run build

      - name: Find build files
        run: |
          echo "Find HTML files:"
          find . -name "*.html" -print
          echo "Find build output folders:"
          find dist -maxdepth 4 -type f | head -100
