name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install deps
        run: npm install

      - name: Build
        env:
          CI: true
        run: npm run build

      - name: Inspect build output
        run: |
          echo "Root files:"
          ls -la
          echo "Dist files:"
          ls -la dist || true
          echo "Dist client files:"
          ls -la dist/client || true
          echo "Output public files:"
          ls -la .output/public || true
